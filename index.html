<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>MVP OCR Layout</title><link rel="stylesheet" href="styles.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script><script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script><script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script></head><body><div class="app"><header><h1>MVP OCR por perfiles</h1><p>Sube una imagen, marca el área de búsqueda, define columnas y exporta a Excel.</p></header><section class="panel"><div class="controls"><input id="upload" type="file" accept="image/png,image/jpeg,image/jpg"><input id="profileName" type="text" placeholder="Nombre del perfil activo"><div class="slots"><button class="slot-btn" data-slot="0">Bolsillo 1</button><button class="slot-btn" data-slot="1">Bolsillo 2</button><button class="slot-btn" data-slot="2">Bolsillo 3</button><button class="slot-btn" data-slot="3">Bolsillo 4</button></div><div class="actions"><button id="btnAddArea">Área</button><button id="btnAddId">Columna ID</button><button id="btnAddName">Columna Nombre</button><button id="btnAddOther">Columna Otro</button><button id="btnDeleteSelected">Eliminar seleccionado</button><button id="btnClearLayout">Limpiar layout</button><button id="btnSaveProfile">Guardar perfil</button><button id="btnRunOCR">Ejecutar OCR</button><button id="btnExport">Exportar XLSX</button></div><div id="status">Listo.</div></div><div class="workspace"><canvas id="canvas"></canvas></div></section><section class="results"><h2>Resultados</h2><div class="table-wrap"><table id="resultsTable"><thead><tr><th>Identificación</th><th>Nombre</th><th>Perfil usado</th><th>Índice de fila</th><th>Texto OCR bruto de identificación</th><th>Texto OCR bruto de nombre</th><th>Confianza OCR identificación</th><th>Confianza OCR nombre</th><th>Observaciones</th></tr></thead><tbody></tbody></table></div></section></div><script src="app.js"></script></body></html>
